# SmolOfis ISO pipeline.
#
# Every push to main (and any v* tag) compiles the Rust control panel as a
# fully static musl binary, bakes it into a Debian live image with
# scripts/build-image.sh, and publishes the flashable ISO — as a workflow
# artifact on every run, and as a GitHub Release on tags plus a rolling
# "nightly" prerelease on main.

name: Build SmolOfis ISO

on:
  push:
    branches: [main]
    tags: ["v*"]
  # Build + smoke-test the ISO on PRs too; the release job stays gated to
  # main/tags (see its `if:`), so pull requests validate without publishing.
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-iso-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-panel:
    name: Compile smolofis-panel (static musl)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools

      - name: Install Rust (stable + musl target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-dashboard

      - name: Check formatting & lints
        working-directory: src-dashboard
        run: |
          cargo fmt --check
          cargo clippy --target x86_64-unknown-linux-musl -- -D warnings

      # Run the suite on the host (gnu) target: the tests bind real TCP/unix
      # sockets and must actually execute, which the native target does without
      # the cross-run friction of the static musl build.
      - name: Run unit tests
        working-directory: src-dashboard
        run: cargo test --locked

      - name: Build release binary
        working-directory: src-dashboard
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Sanity-check binary is static
        run: |
          file src-dashboard/target/x86_64-unknown-linux-musl/release/smolofis-panel
          file src-dashboard/target/x86_64-unknown-linux-musl/release/smolofis-panel | grep -q 'static'

      - name: Upload panel binary
        uses: actions/upload-artifact@v4
        with:
          name: smolofis-panel
          path: src-dashboard/target/x86_64-unknown-linux-musl/release/smolofis-panel
          if-no-files-found: error
          retention-days: 7

  build-iso:
    name: Assemble flashable ISO
    runs-on: ubuntu-latest
    needs: build-panel
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download panel binary
        uses: actions/download-artifact@v4
        with:
          name: smolofis-panel
          path: artifacts

      - name: Install image build toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            debootstrap squashfs-tools xorriso \
            grub-pc-bin grub-efi-amd64-bin grub2-common \
            mtools dosfstools file

      - name: Determine version label
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "${GITHUB_OUTPUT}"
          else
            echo "version=0.1.0-dev.${GITHUB_RUN_NUMBER}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Build ISO
        run: |
          chmod +x artifacts/smolofis-panel scripts/build-image.sh scripts/smolofis-firstboot.sh
          sudo --preserve-env=SMOLOFIS_VERSION scripts/build-image.sh \
            --binary artifacts/smolofis-panel \
            --version "${{ steps.version.outputs.version }}" \
            --output "dist/smolofis-${{ steps.version.outputs.version }}-amd64.iso"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: smolofis-iso-${{ steps.version.outputs.version }}
          path: |
            dist/*.iso
            dist/*.sha256
          if-no-files-found: error
          retention-days: 14

  smoke-test:
    name: Smoke-test ISO in QEMU
    runs-on: ubuntu-latest
    needs: build-iso
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          name: smolofis-iso-${{ needs.build-iso.outputs.version }}
          # upload-artifact strips the common dist/ prefix, so the artifact
          # holds bare-named files; restore them under dist/ where the smoke
          # script and the publish steps expect them.
          path: dist

      - name: Install QEMU + tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 xorriso jq curl

      - name: Boot the ISO and probe the panel
        run: |
          chmod +x scripts/smoke-test-iso.sh
          scripts/smoke-test-iso.sh \
            --iso "dist/smolofis-${{ needs.build-iso.outputs.version }}-amd64.iso"

      - name: Upload guest serial log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-serial-${{ needs.build-iso.outputs.version }}
          path: smoke-serial.log
          if-no-files-found: warn
          retention-days: 7

  release:
    name: Publish ISO release
    runs-on: ubuntu-latest
    # Only publish images that booted and served the panel in CI.
    needs: [build-iso, smoke-test]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          name: smolofis-iso-${{ needs.build-iso.outputs.version }}
          # upload-artifact strips the common dist/ prefix, so the artifact
          # holds bare-named files; restore them under dist/ where the smoke
          # script and the publish steps expect them.
          path: dist

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.iso
            dist/*.sha256
          generate_release_notes: true

      # Recreated from scratch each run via gh: updating an existing release
      # from a branch ref trips auth bugs in release actions, and a fresh
      # release also drops the previous run's version-numbered assets.
      - name: Publish rolling nightly release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete nightly --yes --cleanup-tag || true
          gh release create nightly dist/*.iso dist/*.sha256 \
            --prerelease \
            --target "${GITHUB_SHA}" \
            --title "SmolOfis nightly (main)" \
            --notes "$(cat <<'EOF'
          Rolling build of the `main` branch.
          Flash with: `dd if=smolofis-*.iso of=/dev/sdX bs=4M status=progress conv=fsync`
          Then browse to **http://smolofis.local**.
          EOF
          )"
