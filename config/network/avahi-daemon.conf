# SmolOfis appliance mDNS configuration.
# Publishes the box as smolofis.local on every connected interface so a
# freshly flashed machine is discoverable with zero network setup.

[server]
host-name=smolofis
domain-name=local
use-ipv4=yes
use-ipv6=yes
ratelimit-interval-usec=1000000
ratelimit-burst=1000

[wide-area]
enable-wide-area=yes

[publish]
publish-hinfo=no
publish-workstation=yes
publish-addresses=yes
publish-aaaa-on-ipv4=yes

[reflector]
enable-reflector=no

[rlimits]
rlimit-core=0
rlimit-data=8388608
rlimit-fsize=0
rlimit-nofile=768
rlimit-stack=8388608
rlimit-nproc=3
